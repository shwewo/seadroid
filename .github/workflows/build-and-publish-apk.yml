name: Build & Publish APK

# Builds both the debug and release APKs and publishes each build as its own
# versioned GitHub Release (newest is marked "Latest" automatically):
#   - push to master / manual run  -> new release tagged v<versionName>-<run#>
#   - push a tag like v4.1.0        -> release using that exact tag
# Every run also uploads both APKs as a workflow artifact.
#
# Published assets are named seafile-debug.apk and seafile-release.apk.
#
# Release signing:
#   Set repository secrets to sign the release with a STABLE key (so installs can be
#   updated in place across builds):
#     SIGNING_KEYSTORE_BASE64  - base64 of your .keystore/.jks  (base64 -w0 my.keystore)
#     SIGNING_STORE_PASSWORD
#     SIGNING_KEY_ALIAS
#     SIGNING_KEY_PASSWORD
#   If SIGNING_KEYSTORE_BASE64 is not set, the release is signed with an ephemeral key
#   generated per-run (it still builds, but cannot be updated over a previous install).
#   The debug APK is always signed with Gradle's debug key.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # The native heicgen build uses CMake + NDK. AGP 8.8 has no pinned ndkVersion,
      # so install its default NDK (r27) and CMake to keep CI deterministic.
      - name: Install NDK & CMake
        run: sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # The release signingConfig reads app/key.properties at configuration time (needed even
      # for the debug build). Provide a real release keystore from secrets, or an ephemeral one.
      - name: Prepare signing config
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          STORE_PW: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PW: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > app/release.keystore
            {
              echo "keyStore=release.keystore"
              echo "keyStorePassword=$STORE_PW"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyAliasPassword=$KEY_PW"
            } > app/key.properties
            echo "Signing release with key from secrets."
          else
            echo "::warning::No SIGNING_KEYSTORE_BASE64 secret set; signing release with an ephemeral key (installs are not updatable across builds)."
            keytool -genkeypair -keystore app/release.keystore -storepass ephemeral -keypass ephemeral \
              -alias ci -keyalg RSA -keysize 2048 -validity 3650 -dname "CN=seadroid-ci"
            {
              echo "keyStore=release.keystore"
              echo "keyStorePassword=ephemeral"
              echo "keyAlias=ci"
              echo "keyAliasPassword=ephemeral"
            } > app/key.properties
          fi

      - name: Build debug + release APKs
        run: ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace

      - name: Collect APKs
        id: apk
        run: |
          set -euo pipefail
          mkdir -p dist
          dbg="$(find app/build/outputs/apk/debug -name '*.apk' | head -n1)"
          rel="$(find app/build/outputs/apk/release -name '*.apk' | head -n1)"
          [ -n "$dbg" ] || { echo "No debug APK produced" >&2; exit 1; }
          [ -n "$rel" ] || { echo "No release APK produced" >&2; exit 1; }
          cp "$dbg" dist/seafile-debug.apk
          cp "$rel" dist/seafile-release.apk

          ver="$(grep -oP 'versionName\s+"\K[^"]+' app/build.gradle | head -n1)"
          short_sha="$(git rev-parse --short HEAD)"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # a v* tag was pushed: use it verbatim
            tag="${GITHUB_REF_NAME}"
            relname="${GITHUB_REF_NAME}"
          else
            # master push / manual run: one unique release per build
            tag="v${ver}-${GITHUB_RUN_NUMBER}"
            relname="v${ver} (build ${GITHUB_RUN_NUMBER})"
          fi

          echo "version=$ver"        >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"            >> "$GITHUB_OUTPUT"
          echo "relname=$relname"    >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: seafile-apks-${{ steps.apk.outputs.short_sha }}
          path: dist/*.apk
          retention-days: 30

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk.outputs.tag }}
          name: ${{ steps.apk.outputs.relname }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/seafile-release.apk
            dist/seafile-debug.apk
          body: |
            App version `${{ steps.apk.outputs.version }}`.

            - Commit: ${{ steps.apk.outputs.short_sha }}
            - Built from run [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            **seafile-release.apk** — optimized release build (minified/R8).
            **seafile-debug.apk** — debug build; its package id has a `.debug` suffix, so it
            installs **alongside** a release/Play Store build rather than replacing it.
