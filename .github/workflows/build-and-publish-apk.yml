name: Build & Publish APK

# Builds the (debug-signed) APK and publishes it:
#   - push to master / manual run  -> updates a rolling "latest" pre-release
#   - push a tag like v4.0.9        -> cuts a versioned GitHub Release
# Every run also uploads the APK as a workflow artifact.
#
# Debug signing is used (AGP's default debug keystore) so no secrets are needed.
# The build still requires app/key.properties to exist at configuration time because
# the release signingConfig reads it eagerly; we provide the committed example, whose
# keystore is never actually accessed by assembleDebug.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # The native heicgen build uses CMake + NDK. AGP 8.8 has no pinned ndkVersion,
      # so install its default NDK (r27) and CMake to keep CI deterministic.
      # If a build ever fails on an NDK version mismatch, bump the version here.
      - name: Install NDK & CMake
        run: sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Provide key.properties (debug signing)
        run: cp app/key.properties.example app/key.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        id: apk
        run: |
          set -euo pipefail
          mkdir -p dist
          src="$(find app/build/outputs/apk/debug -name '*.apk' | head -n1)"
          if [ -z "$src" ]; then echo "No APK produced" >&2; exit 1; fi
          ver="$(basename "$src" .apk)"          # e.g. seafile-debug-4.0.9
          sha="$(git rev-parse --short HEAD)"
          versioned="dist/${ver}-${sha}.apk"
          cp "$src" "$versioned"
          cp "$src" "dist/seadroid-latest.apk"   # stable name so the rolling release overwrites
          echo "versioned=$versioned" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ver}-${sha}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.artifact_name }}
          path: ${{ steps.apk.outputs.versioned }}
          retention-days: 30

      - name: Publish versioned release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.versioned }}
          generate_release_notes: true

      - name: Publish rolling "latest" pre-release (master / manual)
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (master)
          prerelease: true
          files: dist/seadroid-latest.apk
          body: |
            Automated **debug-signed** build from the tip of `master`.

            - Commit: ${{ github.sha }}
            - Built: run #${{ github.run_number }}

            > Debug build: package id has a `.debug` suffix, so it installs **alongside**
            > any Play Store / release build rather than replacing it.
